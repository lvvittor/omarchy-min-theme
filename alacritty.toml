[window]
# window padding {px}
padding.x = 45
padding.y = 40
decorations = "none"

[font]
size = 12.0



[colors]
[colors.primary]
background = "#000000"
foreground = "#e7e9ea"
dim_foreground = "#8a8a8d"

[colors.cursor]
text = "#000000"
cursor = "#e7e9ea"

[colors.vi_mode_cursor]
text = "#000000"
cursor = "#e7e9ea"

[colors.selection]
text = "#000000"
background = "#e7e9ea"

# ANSI palette: Dracula (the same palette Claude Code uses for syntax highlighting)
[colors.normal]
black = "#21222c"
red = "#ff5555"
green = "#50fa7b"
yellow = "#f1fa8c"
blue = "#bd93f9"
magenta = "#ff79c6"
cyan = "#8be9fd"
white = "#f8f8f2"

[colors.bright]
black = "#6272a4"
red = "#ff6e6e"
green = "#69ff94"
yellow = "#ffffa5"
blue = "#d6acff"
magenta = "#ff92df"
cyan = "#a4ffff"
white = "#ffffff"
